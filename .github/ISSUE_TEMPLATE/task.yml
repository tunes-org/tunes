name: Task
description: Implementation, research, or docs task for the TUNES programme
title: "[repo:tunes] "
labels: ["repo:tunes"]
body:
  - type: markdown
    attributes:
      value: |
        Use for work in **`tunes`** (charter, schemas, methodology, releases).
        Tag sibling repos with `repo:tunes-ios` or `repo:tunes-web` when routing elsewhere.
        See [05-github-backlog.md](https://github.com/tunes-org/tunes/blob/main/docs/machine/05-github-backlog.md).

  - type: dropdown
    id: repo
    attributes:
      label: Primary repo
      options:
        - repo:tunes
        - repo:tunes-ios
        - repo:tunes-web
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What problem does this solve?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
    validations:
      required: true

  - type: textarea
    id: non_goals
    attributes:
      label: Non-goals

  - type: textarea
    id: acceptance
    attributes:
      label: Acceptance criteria
    validations:
      required: true

  - type: textarea
    id: tests
    attributes:
      label: Tests / verification

  - type: textarea
    id: dependencies
    attributes:
      label: Dependencies

  - type: textarea
    id: research_links
    attributes:
      label: Research / ADR links

  - type: textarea
    id: privacy
    attributes:
      label: Privacy implications

  - type: textarea
    id: data_model
    attributes:
      label: Data-model implications
